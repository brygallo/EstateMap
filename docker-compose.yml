version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-estatedb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-estatedb}"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SERVER_URL: "http://localhost:9000"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    command: >
      sh -c "python manage.py migrate &&
             python init_minio.py &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env
    environment:
      NEXT_INTERNAL_API_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
volumes:
  postgres_data:
  minio_data:
